name: CI
on:
  push:
    branches: ["main"]
    tags: ["@epilot/sdk@*"]
  pull_request:
    branches: ["main"]

permissions:
  id-token: write
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0+sha512.6540583f41cc5f628eb3d9773ecee802f4f9ef9923cc45b69890fb47991d4b092964694ec3a4f738a420c918a333062c8b925d312f42e4f0c263eb603551f977
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0+sha512.6540583f41cc5f628eb3d9773ecee802f4f9ef9923cc45b69890fb47991d4b092964694ec3a4f738a420c918a333062c8b925d312f42e4f0c263eb603551f977
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  auto-release:
    name: Auto-release @epilot/sdk
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check for openapi.json changes
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^clients/.*/openapi\.json$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pnpm
        if: steps.check.outputs.changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0+sha512.6540583f41cc5f628eb3d9773ecee802f4f9ef9923cc45b69890fb47991d4b092964694ec3a4f738a420c918a333062c8b925d312f42e4f0c263eb603551f977

      - uses: actions/setup-node@v5
        if: steps.check.outputs.changed == 'true'
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: https://registry.npmjs.org/

      - name: Generate, build and test
        if: steps.check.outputs.changed == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm run lint:fix
          pnpm --filter @epilot/sdk generate
          pnpm --filter @epilot/sdk build
          pnpm --filter @epilot/sdk test

      - name: Bump version, commit and tag
        if: steps.check.outputs.changed == 'true'
        id: version
        run: |
          cd packages/epilot-sdk-v2
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"

          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/epilot-sdk-v2/ README.md
          git commit -m "@epilot/sdk@${NEW_VERSION#v}"
          git tag "@epilot/sdk@${NEW_VERSION#v}"
          git push origin main --follow-tags

      - name: Publish @epilot/sdk
        if: steps.check.outputs.changed == 'true'
        run: npm publish
        working-directory: packages/epilot-sdk-v2

  publish:
    name: Publish to npm
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/@epilot/sdk@')
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0+sha512.6540583f41cc5f628eb3d9773ecee802f4f9ef9923cc45b69890fb47991d4b092964694ec3a4f738a420c918a333062c8b925d312f42e4f0c263eb603551f977

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Publish @epilot/sdk
        run: npm publish
        working-directory: packages/epilot-sdk-v2
